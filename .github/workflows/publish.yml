name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install project and dev tools
        run: uv sync --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          if not tag.startswith("v"):
              print(f"release tag must start with 'v', got {tag!r}", file=sys.stderr)
              raise SystemExit(1)

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected = tag.removeprefix("v")
          if version != expected:
              print(
                  f"tag/package version mismatch: tag {tag!r}, pyproject version {version!r}",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"tag {tag} matches package version {version}")
          PY

      - name: Diagnose CLI help
        run: uv run cachepawl diagnose-vllm --help

      - name: Focused diagnose CLI tests
        run: uv run pytest tests/cli/test_diagnose_vllm.py -q

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: >
          uv run mypy
          src/cachepawl
          tests
          research/avmp/scripts
          benchmarks/scripts/run_cache_probe.py
          benchmarks/scripts/compare_cache_planners.py
          benchmarks/scripts/create_planner_comparison_pack.py
          benchmarks/scripts/capture_vllm_baseline.py
          benchmarks/scripts/capture_vllm_cache_plan_observation.py
          benchmarks/scripts/capture_vllm_runtime_cache_plan_observation.py
          benchmarks/scripts/create_vllm_cache_diagnostic.py
          benchmarks/scripts/create_vllm_planner_dry_run_probe.py
          benchmarks/scripts/capture_vllm_planner_stage_observation.py
          benchmarks/scripts/create_vllm_planner_stage_advisory_diff.py
          benchmarks/scripts/create_vllm_mutation_readiness.py
          benchmarks/scripts/capture_vllm_runtime_contract_observation.py
          benchmarks/scripts/capture_vllm_live_request_contract_observation.py
          benchmarks/scripts/capture_vllm_mamba_attention_contract_observation.py
          benchmarks/scripts/run_vllm_path_c_advisory_matrix.py

      - name: Full tests
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
